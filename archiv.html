  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .back {
      position: fixed;
      top: 28px;
      left: 32px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #bbbbbb;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: #111; }

    .content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .archiv-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .archiv-item {
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
      width: 320px;
      text-align: center;
      transition: opacity 0.2s;
    }
    .archiv-item:last-child { border-bottom: none; }
    .archiv-item:hover { opacity: 0.6; }
    .archiv-item a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #EDB800;
      text-decoration: none;
      display: block;
      margin-bottom: 6px;
    }
    .archiv-summary {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      color: #aaaaaa;
      letter-spacing: 0.02em;
      line-height: 1.5;
    }
